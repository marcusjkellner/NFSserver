---
- name: Setup /shares 03a_nfs_setup_disk
  hosts: fileserver
  become: true

  tasks:

    - name: Create partition on second disk
      ansible.builtin.command: parted /dev/sdb --script mklabel gpt mkpart primary ext4 0% 100%
      args:
        creates: /dev/sdb1

    - name: Format partition as ext4
      ansible.builtin.command: mkfs.ext4 /dev/sdb1
      args:
        creates: /dev/sdb1

    - name: Create /shares directory
      ansible.builtin.file:
        path: /shares
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Mount /shares with quota support
      ansible.builtin.mount:
        path: /shares
        src: /dev/sdb1
        fstype: ext4
        opts: defaults,usrquota,grpquota
        state: mounted

    - name: Show done message
      ansible.builtin.debug:
        msg: "=== /shares disk is mounted! ==="
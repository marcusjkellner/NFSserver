---
- name: Setup /shares 03a_nfs_setup_disk
  hosts: fileserver
  become: true

  tasks:

    # Create partition on second disk
    - name: Create partition on second disk
      community.general.parted:
        device: /dev/sdb
        number: 1
        state: present
        part_type: primary
        part_start: "0%"
        part_end: "100%"

    # Format partition — only if not already formatted
    - name: Format partition as ext4
      community.general.filesystem:
        fstype: ext4
        dev: /dev/sdb1
        force: false

    # Create /shares mount point
    - name: Create /shares directory
      ansible.builtin.file:
        path: /shares
        state: directory
        owner: root
        group: root
        mode: '0755'

    # Mount /shares with quota support and add to fstab automatically
    - name: Mount /shares with quota support
      ansible.builtin.mount:
        path: /shares
        src: /dev/sdb1
        fstype: ext4
        opts: defaults,usrquota,grpquota
        state: mounted

    - name: Show done message
      ansible.builtin.debug:
        msg: "=== /shares disk is mounted! ==="
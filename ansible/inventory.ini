# inventory.ini
# Maskiner grupperas med [gruppnamn]

[webserver]
webserver ansible_host=192.168.2.43

[fileserver]
fileserver ansible_host=192.168.2.42

[all:vars]
# Variabler som gäller alla maskiner
ansible_user=webserver
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_python_interpreter=/usr/bin/python3
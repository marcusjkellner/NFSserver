---
- name: Install the NFS client on both client VMs
  hosts: clients
  become: true

  tasks:
    - name: Install NFS client package
      ansible.builtin.apt:
        name: nfs-common
        state: present
        update_cache: yes

    - name: Show done message
      ansible.builtin.debug:
        msg: "=== NFS client is installed =="


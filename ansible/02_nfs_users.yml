---
- name: Configure users, user groups and set quotas
  hosts: fileserver
  become: true
  
  
  tasks:
  # Create Legal user group and set a group quota
    - name: User group Legal
      ansible.builtin.group:
        name: group-Legal
        state: present



  # Create Sales user group and set a group quota
    - name: User group Sales
      ansible.builtin.group:
        name: group-Sales
        state: present



  #Create Legal users and give them a personal quota
    - name: Create user Anna_Legal
      ansible.builtin.user:
        name: Anna_Legal
        groups: group-Legal, users
        shell: /bin/bash
        create_home: yes



  #Create Sales users and give them a personal quota
    - name: Create user Peter_Sales
      ansible.builtin.user:
        name: Peter_Sales
        groups: group-Sales, users
        shell: /bin/bash
        create_home: yes




    - name: Show done message
      ansible.builtin.debug:
        msg: "=== Group: Legal and Sales & Users: Anna and Peter created and quotes are set! =="

    
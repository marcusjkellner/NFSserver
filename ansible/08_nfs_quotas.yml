---
- name: Configure Quotas on Fileserver
  hosts: fileserver
  become: true
  
  
  tasks:
    - name: Remount /shares to apply quota options
      ansible.builtin.command: mount -o remount /shares
      changed_when: false

    - name: Run quotacheck on all filesystems
      ansible.builtin.command: quotacheck -avugm
      changed_when: false
   
    - name: Set quota for group-Legal
      ansible.builtin.command: setquota -g group-Legal 4800000 5000000 0 0 /shares
      changed_when: false

    - name: Set quota for group-Sales
      ansible.builtin.command: setquota -g group-Sales 4800000 5000000 0 0 /shares
      changed_when: false

    - name: Set quota for Anna_Legal
      ansible.builtin.command: setquota -u Anna_Legal 1000000 1200000 0 0 /shares
      changed_when: false

    - name: Set quota for Peter_Sales
      ansible.builtin.command: setquota -u Peter_Sales 1000000 1200000 0 0 /shares
      changed_when: false

    - name: Show quota report
      ansible.builtin.command: repquota -avs
      register: quota_report
      changed_when: false

    - name: Print quota report
      ansible.builtin.debug:
        msg: "{{ quota_report.stdout }}"
    
    - name: Show done message
      ansible.builtin.debug:
        msg: "=== Quotas are set!!! =="


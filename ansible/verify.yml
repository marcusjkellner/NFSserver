---
# ── STEP 1: Anna creates files from clientLegal ──────────────────────────────
- name: Step 1 - Anna creates files
  hosts: clients[0]
  become: true

  tasks:
    - name: Anna creates 1MB file in /mnt/Common
      ansible.builtin.command: dd if=/dev/zero of=/mnt/Common/anna_common.txt bs=1M count=1
      become_user: Anna_Legal

    - name: Anna creates 1MB file in /mnt/Legal
      ansible.builtin.command: dd if=/dev/zero of=/mnt/Legal/anna_legal.txt bs=1M count=1
      become_user: Anna_Legal

    - name: Show done
      ansible.builtin.debug:
        msg: "=== Anna created her files ==="

# ── STEP 2: Peter sees Annas file and tests access ───────────────────────────
- name: Step 2 - Peter tests access from clientSales
  hosts: clients[1]
  become: true

  tasks:
    - name: Peter reads Annas file in /mnt/Common
      ansible.builtin.command: ls -lh /mnt/Common/anna_common.txt
      become_user: Peter_Sales
      register: peter_sees_anna

    - name: Print result
      ansible.builtin.debug:
        msg: "Peter sees Annas file: {{ peter_sees_anna.stdout }}"

    - name: Peter creates 2MB file in /mnt/Common
      ansible.builtin.command: dd if=/dev/zero of=/mnt/Common/peter_common.txt bs=1M count=2
      become_user: Peter_Sales

    - name: Peter tries to write to /mnt/Legal
      ansible.builtin.command: dd if=/dev/zero of=/mnt/Legal/peter_legal.txt bs=1M count=3
      become_user: Peter_Sales
      register: peter_legal
      failed_when: peter_legal.rc == 0
      changed_when: false

    - name: Print Legal access result
      ansible.builtin.debug:
        msg: "Peter denied writing to /mnt/Legal: {{ 'PASS ✅' if peter_legal.rc != 0 else 'FAIL ❌' }}"

    - name: Peter creates 2MB file in /mnt/Sales
      ansible.builtin.command: dd if=/dev/zero of=/mnt/Sales/peter_sales.txt bs=1M count=2
      become_user: Peter_Sales

    - name: Show done
      ansible.builtin.debug:
        msg: "=== Peter done ==="

# ── STEP 3: Quota report ─────────────────────────────────────────────────────
- name: Step 3 - Quota report
  hosts: fileserver
  become: true

  tasks:
    - name: Sync quota usage
      ansible.builtin.command: quotacheck -avugm
      changed_when: false

#####
    - name: Get user quota report
      ansible.builtin.command: repquota -avs
      register: user_quota
      changed_when: false

    - name: Get group quota report
      ansible.builtin.command: repquota -avgs
      register: group_quota
      changed_when: false

    - name: Print quota report
      ansible.builtin.debug:
        msg: "{{ quota_report.stdout_lines }}"

    - name: Cleanup test files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /shares/Common/anna_common.txt
        - /shares/Legal/anna_legal.txt
        - /shares/Common/peter_common.txt
        - /shares/Sales/peter_sales.txt

    - name: Print final message
      ansible.builtin.debug:
        msg: "=== Verification complete ==="


  
        
---
- name: Create mounts on clients
  hosts: clients
  become: true

# Creates mount points (empty directories) on both clients.
  tasks:
    - name: Create mount point for /Common
      ansible.builtin.file:
        name: /mnt/Common
        state: directory
  
    - name: Create mount point for /Legal
      ansible.builtin.file:
        name: /mnt/Legal
        state: directory

    - name: Create mount point for /Sales
      ansible.builtin.file:
        name: /mnt/Sales
        state: directory     

    - name: Show done message
      ansible.builtin.debug:
        msg: "=== clients have their mounts created =="
---
- name: Configure webserver
  hosts: webserver
  become: true
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install apache2
      ansible.builtin.apt:
        name: apache2
        state: present

    - name: Enable and start apache2
      ansible.builtin.service:
        name: apache2
        enabled: true
        state: started

    - name: Create index.html
      ansible.builtin.copy:
        dest: /var/www/html/index.html
        content: "Webbserver klar!\n"
        owner: root
        group: root
        mode: '0644'

    - name: Show done message
      ansible.builtin.debug:
        msg: "=== Klar! ==="